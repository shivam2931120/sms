{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2><i class="bi bi-receipt"></i> {{ 'Edit' if fee and fee.id else 'Add' }} Fee</h2>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Student <span class="text-danger">*</span></label>
                    <select class="form-select" name="student_id" required>
                        <option value="">Select Student</option>
                        {% for student in students %}
                        <option value="{{ student.id }}" {% if fee and fee.student_id == student.id %}selected{% endif %}>
                            {{ student.roll_no or 'N/A' }} - {{ student.first_name }} {{ student.last_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="title" value="{{ (fee.title or '') if fee else '' }}"
                        placeholder="e.g., Term 1 Fee" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">{{ config.RAZORPAY_CURRENCY }}</span>
                        <input type="number" class="form-control" name="amount" min="0" step="0.01"
                            value="{{ fee.amount if fee and fee.amount is not none else '' }}" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Due Date</label>
                    <input type="date" class="form-control" name="due_date"
                        value="{{ fee.due_date.strftime('%Y-%m-%d') if fee and fee.due_date else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status">
                        {% for status in statuses %}
                        <option value="{{ status }}" {% if fee and fee.status == status %}selected{% endif %}>{{ status }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Paid Date</label>
                    <input type="date" class="form-control" name="paid_date"
                        value="{{ fee.paid_date.strftime('%Y-%m-%d') if fee and fee.paid_date else '' }}">
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
                    <a href="{{ url_for('admin.fees_management') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
